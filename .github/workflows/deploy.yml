name: Deploy

on:
  push:
    branches: [master, staging]
  workflow_dispatch:

# Don't let two deploys to the same branch race. Queue them instead.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest

    # Selects which GitHub Environment's secrets/vars are loaded.
    # `production` for master, `staging` for staging.
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}

    env:
      # Wrangler reads these automatically.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Baked into the admin's JS bundle at build time. Per-env value lives
      # under the GitHub Environment as a (non-secret) variable.
      NEXT_PUBLIC_WORKOS_REDIRECT_URI: ${{ vars.NEXT_PUBLIC_WORKOS_REDIRECT_URI }}

      # Server-side env var the admin uses to call the backend at request time.
      # Baked into the OpenNext worker bundle at build time.
      BACKEND_URL: ${{ vars.BACKEND_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Pick wrangler env
        run: |
          # Top-level wrangler config is production. Explicit `--env=""` silences
          # the "no env specified" warning Wrangler 4 emits when env blocks exist.
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo 'WRANGLER_ARGS=--env=' >> $GITHUB_ENV
          else
            echo 'WRANGLER_ARGS=--env=staging' >> $GITHUB_ENV
          fi

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify Cloudflare auth
        run: |
          pnpm --filter @darna/backend exec wrangler whoami

          echo "--- Sanity-check the CLOUDFLARE_ACCOUNT_ID secret ---"
          echo "secret length: ${#CLOUDFLARE_ACCOUNT_ID} (expected 32)"
          echo -n "$CLOUDFLARE_ACCOUNT_ID" | wc -c | awk '{print "byte count (no newline):", $1}'
          # Hex check: should be true. If false, secret has whitespace or wrong chars.
          if [[ "$CLOUDFLARE_ACCOUNT_ID" =~ ^[0-9a-f]{32}$ ]]; then
            echo "format: ✓ 32 hex chars"
          else
            echo "format: ✗ NOT 32 hex chars — the secret is malformed"
          fi

          echo "--- Workers Scripts API probe ---"
          curl -sS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts" \
            | python3 -c "import sys, json; d=json.load(sys.stdin); print('success:', d.get('success')); print('errors:', d.get('errors')); print('result count:', len(d.get('result') or []))"

      - name: Deploy backend
        run: pnpm --filter @darna/backend exec wrangler deploy $WRANGLER_ARGS

      - name: Sync backend Worker secrets
        # Worker runtime secrets live in Cloudflare's per-Worker secret store,
        # not in the deploy bundle. Sync them after each deploy so a fresh CI
        # run can fix a missing or stale secret without manual `wrangler secret
        # put` from a laptop. `printf '%s'` avoids trailing newlines.
        env:
          WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
        run: |
          printf '%s' "$WORKOS_CLIENT_ID" | pnpm --filter @darna/backend exec wrangler secret put WORKOS_CLIENT_ID $WRANGLER_ARGS

      - name: Build & deploy admin
        run: |
          pnpm --filter @darna/admin exec opennextjs-cloudflare build
          pnpm --filter @darna/admin exec opennextjs-cloudflare deploy $WRANGLER_ARGS

      - name: Sync admin Worker secrets
        env:
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
        run: |
          printf '%s' "$WORKOS_API_KEY"          | pnpm --filter @darna/admin exec wrangler secret put WORKOS_API_KEY          $WRANGLER_ARGS
          printf '%s' "$WORKOS_CLIENT_ID"        | pnpm --filter @darna/admin exec wrangler secret put WORKOS_CLIENT_ID        $WRANGLER_ARGS
          printf '%s' "$WORKOS_COOKIE_PASSWORD"  | pnpm --filter @darna/admin exec wrangler secret put WORKOS_COOKIE_PASSWORD  $WRANGLER_ARGS

      - name: Build & deploy docs
        run: |
          pnpm --filter @darna/docs exec opennextjs-cloudflare build
          pnpm --filter @darna/docs exec opennextjs-cloudflare deploy $WRANGLER_ARGS
