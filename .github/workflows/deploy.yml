name: Deploy

on:
  push:
    branches: [master, staging]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # Run JS-based actions on Node.js 24. Node.js 20 is deprecated on GitHub
  # runners (forced default 2026-06-02, removed 2026-09-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/verify

  migrate-backend:
    name: Migrate backend database
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deploy

      - name: Apply database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not set for this environment."
            exit 1
          fi
          pnpm --filter @darna/backend run db:migrate

  deploy-backend:
    name: Deploy backend
    needs: [verify, migrate-backend]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deploy
        id: setup

      - name: Deploy backend
        env:
          OTEL_DEPLOYMENT_ENV: ${{ vars.OTEL_DEPLOYMENT_ENV }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          WRANGLER_ARGS: ${{ steps.setup.outputs.wrangler-args }}
        run: |
          ARGS="$WRANGLER_ARGS"
          [ -n "$OTEL_DEPLOYMENT_ENV" ]         && ARGS="$ARGS --var OTEL_DEPLOYMENT_ENV:$OTEL_DEPLOYMENT_ENV"
          [ -n "$OTEL_EXPORTER_OTLP_ENDPOINT" ] && ARGS="$ARGS --var OTEL_EXPORTER_OTLP_ENDPOINT:$OTEL_EXPORTER_OTLP_ENDPOINT"
          pnpm --filter @darna/backend exec wrangler deploy $ARGS

      - name: Sync backend Worker secrets
        env:
          WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
          GRAFANA_OTEL_AUTH_HEADER: ${{ secrets.GRAFANA_OTEL_AUTH_HEADER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WRANGLER_ARGS: ${{ steps.setup.outputs.wrangler-args }}
        run: |
          printf '%s' "$WORKOS_CLIENT_ID"          | pnpm --filter @darna/backend exec wrangler secret put WORKOS_CLIENT_ID          $WRANGLER_ARGS
          printf '%s' "$GRAFANA_OTEL_AUTH_HEADER"  | pnpm --filter @darna/backend exec wrangler secret put GRAFANA_OTEL_AUTH_HEADER  $WRANGLER_ARGS
          printf '%s' "$DATABASE_URL"              | pnpm --filter @darna/backend exec wrangler secret put DATABASE_URL              $WRANGLER_ARGS

  deploy-admin:
    name: Deploy admin
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_WORKOS_REDIRECT_URI: ${{ vars.NEXT_PUBLIC_WORKOS_REDIRECT_URI }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deploy
        id: setup

      - name: Build & deploy admin
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          WRANGLER_ARGS: ${{ steps.setup.outputs.wrangler-args }}
        run: |
          pnpm --filter @darna/admin exec opennextjs-cloudflare build
          ARGS="$WRANGLER_ARGS"
          [ -n "$BACKEND_URL" ] && ARGS="$ARGS --var BACKEND_URL:$BACKEND_URL"
          pnpm --filter @darna/admin exec wrangler deploy $ARGS

      - name: Sync admin Worker secrets
        env:
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
          WRANGLER_ARGS: ${{ steps.setup.outputs.wrangler-args }}
        run: |
          printf '%s' "$WORKOS_API_KEY"          | pnpm --filter @darna/admin exec wrangler secret put WORKOS_API_KEY          $WRANGLER_ARGS
          printf '%s' "$WORKOS_CLIENT_ID"        | pnpm --filter @darna/admin exec wrangler secret put WORKOS_CLIENT_ID        $WRANGLER_ARGS
          printf '%s' "$WORKOS_COOKIE_PASSWORD"  | pnpm --filter @darna/admin exec wrangler secret put WORKOS_COOKIE_PASSWORD  $WRANGLER_ARGS

  deploy-docs:
    name: Deploy docs
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deploy
        id: setup

      - name: Build & deploy docs
        run: |
          pnpm --filter @darna/docs exec opennextjs-cloudflare build
          pnpm --filter @darna/docs exec opennextjs-cloudflare deploy ${{ steps.setup.outputs.wrangler-args }}

  deploy-web-client:
    name: Deploy web-client
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deploy
        id: setup

      - name: Build & deploy web-client
        run: |
          pnpm --filter web-client exec opennextjs-cloudflare build
          pnpm --filter web-client exec opennextjs-cloudflare deploy ${{ steps.setup.outputs.wrangler-args }}
